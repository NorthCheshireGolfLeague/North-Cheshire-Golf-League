<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCL League</title>

<link rel="icon" href="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">
<link rel="apple-touch-icon" href="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">

<style>
html, body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #1f3c88, #2e5cb8);
  color: white;
}

/* NAV */
nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #2e5cb8;
}

nav button {
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: #2e5cb8;
  color: white;
  font-weight: bold;
  font-size: 12px;
  cursor: pointer;
}

nav button:hover {
  background: #d4af37;
  color: black;
}

/* PAGES */
.page {
  display: none;
  padding: 10px;
}

.active {
  display: block;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 10px;
  border-radius: 8px;
  font-size: 12px;
}

th {
  background: #1f3c88;
  color: white;
  padding: 8px;
}

td {
  padding: 6px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

/* Sticky team column */
#t1 td:nth-child(2),
#t2 td:nth-child(2) {
  position: sticky;
  left: 0;
  background: white;
  font-weight: bold;
}

#t1 th:nth-child(2),
#t2 th:nth-child(2) {
  position: sticky;
  left: 0;
  background: #1f3c88;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 4px 8px;
  margin: 2px;
  border-radius: 6px;
  font-size: 11px;
  text-decoration: none;
  color: white;
}

.call-btn { background: #1f3c88; }
.whatsapp-btn { background: #d4af37; color:black; font-weight:bold; }

/* Knockout cards */
.match {
  background: white;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}

.stage {
  margin-top: 15px;
  font-weight: bold;
  color: #1f3c88;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png" width="100">
  <h2>North Cheshire Golf League</h2>
</div>

<nav>
  <button onclick="show('f1')">1st Team Fixtures</button>
  <button onclick="show('t1')">1st Team League Table</button>
  <button onclick="show('f2')">2nd Team Fixtures</button>
  <button onclick="show('t2')">2nd Team League Table</button>
  <button onclick="show('knockout')">Knockout Finals</button>
  <button onclick="show('rules')">Rules</button>
  <button onclick="show('honors')">Honors</button>
  <button onclick="show('contacts')">Contacts</button>
</nav>

<div id="f1" class="page"></div>
<div id="t1" class="page"></div>
<div id="f2" class="page"></div>
<div id="t2" class="page"></div>

<div id="knockout" class="page">
  <h3>1st Team</h3>
  <div id="ko1"></div>

  <h3>2nd Team</h3>
  <div id="ko2"></div>
</div>

<div id="rules" class="page"></div>
<div id="honors" class="page"></div>
<div id="contacts" class="page"></div>

<script>
const sheetID = "1e3Tl5l6zLqx8Vbk6PX1U13eRyZ2McFd2qcLJhmWGh5g";

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadTable(sheet, element){
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;

  fetch(url)
  .then(res=>res.text())
  .then(data=>{
    const json = JSON.parse(data.substr(47).slice(0,-2));
    const rows = json.table.rows;
    const cols = json.table.cols;

    let html = "<table><tr>";

    let maxCols = sheet.includes("Fixtures") ? 6 : sheet.includes("League Table") ? 16 : cols.length;

    cols.slice(0,maxCols).forEach((c,i)=>{
      let header = c.label || "";
      html += `<th>${header}</th>`;
    });

    html += "</tr>";

    rows.forEach(r=>{
      if(!r.c) return;

      html += "<tr>";

      r.c.slice(0,maxCols).forEach(c=>{
        let value = c && (c.f || c.v) ? (c.f || c.v) : "";

        if(element === "contacts" && value && value.toString().startsWith("07")){
          let clean = value.replace(/\s/g,"");

          html += `<td>
            ${value}<br>
            <a class="btn call-btn" href="tel:${clean}">Call</a>
            <a class="btn whatsapp-btn" href="https://wa.me/44${clean.substring(1)}">Message</a>
          </td>`;
        } else {
          html += `<td>${value}</td>`;
        }
      });

      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(element).innerHTML = html;
  });
}

/* KNOCKOUT */
function loadKO(sheet, element){
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;

  fetch(url)
  .then(res=>res.text())
  .then(data=>{
    const json = JSON.parse(data.substr(47).slice(0,-2));
    const rows = json.table.rows;

    let html = "";
    let currentStage = "";

    rows.forEach(r=>{
      if(!r.c) return;

      const stage = r.c[0]?.v || "";
      const home = r.c[1]?.v || "";
      const hs = r.c[2]?.v ?? "";
      const as = r.c[3]?.v ?? "";
      const away = r.c[4]?.v || "";
      const date = r.c[5]?.f || "";
      const venue = r.c[6]?.v || "";

      if(stage !== currentStage){
        html += `<div class="stage">${stage}</div>`;
        currentStage = stage;
      }

      html += `
        <div class="match">
          <div><strong>${home}</strong> ${hs} - ${as} <strong>${away}</strong></div>
          <div style="font-size:11px;color:#666">${date} | ${venue}</div>
        </div>
      `;
    });

    document.getElementById(element).innerHTML = html;
  });
}

/* LOAD */
loadTable("1st Team Fixtures","f1");
loadTable("1st Team League Table (Sorted)","t1");
loadTable("2nd Team Fixtures","f2");
loadTable("2nd Team League Table (Sorted)","t2");

loadKO("Knockout Finals 1st Team","ko1");
loadKO("Knockout Finals 2nd Team","ko2");

loadTable("Rules","rules");
loadTable("Honors","honors");
loadTable("Contacts","contacts");

show("f1");
</script>

</body>
</html>
