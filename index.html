<body>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.header {
  text-align: center;
  padding: 20px;
  background: #1f3c88;
  color: white;
}

nav {
  display: flex;
  flex-wrap: wrap;
  background: #2e5cb8;
}

nav button {
  flex: 1;
  padding: 12px;
  border: none;
  background: #2e5cb8;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

nav button:hover {
  background: #d4af37;
  color: black;
}

.page {
  display: none;
  padding: 15px;
}

.active {
  display: block;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 10px;
  border-radius: 8px;
  overflow: hidden;
}

th {
  background: #1f3c88;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

tr:hover {
  background: #f1f1f1;
}

tr:first-child td {
  background: #d4af37;
  font-weight: bold;
}

#knockout table {
  border: 2px solid #d4af37;
}

#knockout th {
  background: #1f3c88;
}

#knockout td:first-child {
  font-weight: bold;
  background: #eef3ff;
}

/* Quarter Finals */
#knockout tr:nth-child(2),
#knockout tr:nth-child(3),
#knockout tr:nth-child(15),
#knockout tr:nth-child(16) {
  border-left: 5px solid #1f3c88;
}

/* Semi Finals */
#knockout tr:nth-child(5),
#knockout tr:nth-child(6),
#knockout tr:nth-child(18),
#knockout tr:nth-child(19) {
  border-left: 5px solid #d4af37;
}

/* Final */
#knockout tr:nth-child(8),
#knockout tr:nth-child(21) {
  border-left: 5px solid green;
  font-weight: bold;
}

</style>

<div class="header">
  <img src="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">
  <h1>North Cheshire Golf League</h1>
  <p>League Tables & Fixtures</p>
</div>

<nav>
  <button onclick="show('f1')">1st Team Fixtures</button>
  <button onclick="show('t1')">1st Team League Table</button>
  <button onclick="show('f2')">2nd Team Fixtures</button>
  <button onclick="show('t2')">2nd Team League Table</button>
  <button onclick="show('knockout')">Knockout Finals</button>
  <button onclick="show('rules')">Rules</button>
  <button onclick="show('honors')">Honors</button>
  <button onclick="show('contacts')">Contacts</button>
</nav>

<div id="f1" class="page"></div>
<div id="t1" class="page"></div>
<div id="f2" class="page"></div>
<div id="t2" class="page"></div>
<div id="knockout" class="page">
  <h2>1st Team Knockout</h2>
  <div id="ko1"></div>

  <h2>2nd Team Knockout</h2>
  <div id="ko2"></div>
</div>
<div id="rules" class="page"></div>
<div id="honors" class="page"></div>
<div id="contacts" class="page"></div>

<script>
const sheetID = "1e3Tl5l6zLqx8Vbk6PX1U13eRyZ2McFd2qcLJhmWGh5g";


function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // remove active class from all buttons
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active-tab'));

  // add active class to clicked button
  event.target.classList.add('active-tab');
}

function load(sheet, element){

  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
  
  fetch(url)
  .then(res=>res.text())
  .then(data=>{
    const json = JSON.parse(data.substr(47).slice(0,-2));
    const rows = json.table.rows;
    const cols = json.table.cols;

    let html = "<table><tr>";

    // ONLY show first 6 columns (A–F)
  let maxCols;

if(sheet.includes("Fixtures")){
  maxCols = 6;
} else if(sheet.includes("League Table")){
  maxCols = 16;
} else if(sheet.includes("Knockout")){
  maxCols = 7;
} else {
  maxCols = cols.length;
}

     cols.slice(0,maxCols).forEach(c=>{
  html += `<th>${c.label||""}</th>`;
});

    html += "</tr>";

  let lastRound = null;
let useAlt = false;

rows.forEach(r=>{
  const round = r.c[0] ? r.c[0].v : "";

  if(round !== lastRound){
    useAlt = !useAlt;
    lastRound = round;
  }

  let rowStyle = useAlt ? "background:#eef3ff;" : "";

  html += `<tr style="${rowStyle}">`;
      r.c.slice(0,maxCols).forEach(c=>{
        html += `<td>${c && c.v != null ? c.v : ""}</td>`;
      });
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(element).innerHTML = html;
  });
}

load("1st Team Fixtures","f1");
load("1st Team League Table (Sorted)","t1");
load("2nd Team Fixtures","f2");
load("2nd Team League Table (Sorted)","t2");
load("Knockout Finals","knockout");
load("Rules","rules");
load("Honors","honors");
load("Contacts","contacts");

show("f1");
document.querySelector('nav button').classList.add('active-tab');
</script>

</body>
</html>
