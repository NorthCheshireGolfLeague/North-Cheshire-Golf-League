<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NCL League</title>

<link rel="icon" href="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

.header {
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #1f3c88, #2e5cb8);
  color: white;
  width: 100%;
}

.header img {
  width: 110px;
}

nav {
  display: flex;
  flex-wrap: wrap;
  background: #2e5cb8;
}

nav button {
  flex: 1;
  padding: 14px;
  border: none;
  background: #2e5cb8;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

nav button:hover,
nav button.active {
  background: #d4af37;
  color: black;
}

.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* TABLES */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 15px;
  border-radius: 10px;
  overflow: hidden;
  display: block;
  overflow-x: auto;
  white-space: nowrap;
}

th {
  background: #1f3c88;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

/* Hover */
tr:hover {
  background: #dfe8ff !important;
}

/* Bold team names */
#f1 td:nth-child(2),
#f1 td:nth-child(5),
#f2 td:nth-child(2),
#f2 td:nth-child(5),
#t1 td:nth-child(2),
#t2 td:nth-child(2) {
  font-weight: bold;
}

/* Knockout styling */
.match {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.match .teams {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.match .score {
  text-align: center;
  margin: 5px 0;
  font-size: 18px;
}

.match
