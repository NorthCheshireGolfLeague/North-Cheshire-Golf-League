<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NCL League</title>

<link rel="icon" href="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.header {
  text-align: center;
  padding: 20px;
  background: #1f3c88;
  color: white;
}

.header img {
  width: 120px;
}

nav {
  display: flex;
  flex-wrap: wrap;
  background: #2e5cb8;
}

nav button {
  flex: 1;
  padding: 12px;
  border: none;
  background: #2e5cb8;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

nav button:hover {
  background: #d4af37;
  color: black;
}

.page {
  display: none;
  padding: 15px;
}

.active {
  display: block;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 10px;
}

th {
  background: #1f3c88;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

#f1 td:nth-child(2),
#f1 td:nth-child(5),
#f2 td:nth-child(2),
#f2 td:nth-child(5) {
  font-weight: bold;
}

#t1 td:nth-child(2),
#t2 td:nth-child(2) {
  font-weight: bold;
}

#honors th {
  background: #d4af37;
  color: black;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/t4HrGR7v/NCL-LOGO-LARGE-DARK.png">
  <h1>North Cheshire Golf League</h1>
  <p>League Tables & Fixtures</p>
</div>

<nav>
  <button onclick="show('f1')">1st Team Fixtures</button>
  <button onclick="show('t1')">1st Team League Table</button>
  <button onclick="show('f2')">2nd Team Fixtures</button>
  <button onclick="show('t2')">2nd Team League Table</button>
  <button onclick="show('knockout')">Knockout Finals</button>
  <button onclick="show('rules')">Rules</button>
  <button onclick="show('honors')">Honors</button>
  <button onclick="show('contacts')">Contacts</button>
</nav>

<div id="f1" class="page"></div>
<div id="t1" class="page"></div>
<div id="f2" class="page"></div>
<div id="t2" class="page"></div>
<div id="knockout" class="page"></div>
<div id="rules" class="page"></div>
<div id="honors" class="page"></div>
<div id="contacts" class="page"></div>

<script>
const sheetID = "1e3Tl5l6zLqx8Vbk6PX1U13eRyZ2McFd2qcLJhmWGh5g";

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function load(sheet, element){
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;

  fetch(url)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substr(47).slice(0,-2));
    const rows = json.table.rows;
    const cols = json.table.cols;

    let html = "<table><tr>";

    let maxCols;

    if(sheet.includes("Fixtures")){
      maxCols = 6;
    } else if(sheet.includes("League Table")){
      maxCols = 16;
    } else if(sheet.includes("Knockout")){
      maxCols = 7;
    } else {
      maxCols = cols.length;
    }

    // headers
    cols.slice(0, maxCols).forEach(c => {
      html += `<th>${c.label || ""}</th>`;
    });

    html += "</tr>";

    // rows
    rows.forEach(r => {
      if(!r.c) return;

      html += "<tr>";

      r.c.slice(0, maxCols).forEach(c => {
        let value = c && (c.f || c.v) ? (c.f || c.v) : "";
        html += `<td>${value}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";

    document.getElementById(element).innerHTML = html;
  });
}

// LOAD ALL DATA
load("1st Team Fixtures","f1");
load("1st Team League Table (Sorted)","t1");
load("2nd Team Fixtures","f2");
load("2nd Team League Table (Sorted)","t2");
load("Knockout Finals","knockout");
load("Rules","rules");
load("Honors","honors");
load("Contacts","contacts");

// default page
show("f1");
</script>

</body>
</html>
